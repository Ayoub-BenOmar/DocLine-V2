name: CI/CD with Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: docline
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: docline_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: Frontend/frontend-app/package-lock.json

      - name: Build and Test Frontend
        working-directory: Frontend/frontend-app
        run: |
          npm ci
          npm run lint --if-present
          npm run test -- --watch=false
          npm run build

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test Backend
        working-directory: Backend
        run: mvn clean verify
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/docline_test
          SPRING_DATASOURCE_USERNAME: docline
          SPRING_DATASOURCE_PASSWORD: testpassword
          DB_PASSWORD: testpassword
          JWT_SECRET: ci-test-secret-key-for-jwt-signing-minimum-256-bits

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend Docker image
        run: docker build -t docline-frontend:latest ./Frontend/frontend-app

      - name: Build Backend Docker image
        run: docker build -t docline-backend:latest ./Backend

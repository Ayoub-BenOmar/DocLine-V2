<nav class="fixed top-0 left-0 right-0 bg-white border-b border-gray-200 z-50">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <!-- Left side: Logo + Navigation -->
    <div class="flex items-center gap-12">
      <!-- Logo -->
      <a routerLink="/" class="flex items-center gap-3 hover:opacity-90 transition">
        <img src="/DocLine_Logo.png" alt="DocLine Logo" class="h-10 w-10">
        <span class="text-xl font-bold text-[#2caea9]">DocLine</span>
      </a>

      <!-- Navigation Links -->
      <div class="hidden md:flex items-center gap-8">
        <a routerLink="/" routerLinkActive="text-[#2caea9]" [routerLinkActiveOptions]="{ exact: true }"
           class="text-gray-700 hover:text-[#2caea9] font-medium transition">Home</a>
        <a routerLink="/doctors"
           class="text-gray-700 hover:text-[#2caea9] font-medium transition">Doctors</a>
        <a href="#about"
           class="text-gray-700 hover:text-[#2caea9] font-medium transition">About</a>
        <a href="#contact"
           class="text-gray-700 hover:text-[#2caea9] font-medium transition">Contact Us</a>
      </div>
    </div>

    <!-- Auth Buttons -->
    <div class="flex items-center gap-3">
      <ng-container *ngIf="!isAuthenticated">
        <a routerLink="/auth/login"
           class="px-4 py-2 text-[#2caea9] border-2 border-[#2caea9] rounded-lg font-semibold hover:bg-[#2caea9] hover:text-white transition">
          Login
        </a>
        <a routerLink="/auth/register"
           class="px-6 py-2 bg-[#2caea9] text-white rounded-lg hover:bg-[#238b82] font-medium">
          Sign Up
        </a>
      </ng-container>
      <ng-container *ngIf="isAuthenticated">
        <span class="text-gray-700 font-semibold text-sm">{{ userName }}</span>
        <a [routerLink]="getRolePath()"
           class="px-4 py-2 bg-[#2caea9] text-white rounded-lg font-semibold hover:bg-[#238f8a] transition">
          Dashboard
        </a>
        <button (click)="logout()"
                class="px-4 py-2 text-red-500 border-2 border-red-500 rounded-lg font-semibold hover:bg-red-500 hover:text-white transition">
          Logout
        </button>
      </ng-container>
    </div>
  </div>
</nav>

<div class="admin-shell">

  <!-- Notification Container -->
  <app-notification-container></app-notification-container>

  <!-- Sidebar Navigation -->
  <aside class="sidebar" [ngClass]="isSidebarOpen ? 'sidebar-open' : 'sidebar-collapsed'">
    
    <!-- Header Logo -->
    <div class="logo-area">
      <div class="logo-inner">
        <div class="nav-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <span class="logo-text" *ngIf="isSidebarOpen">DocLine Practitioner</span>
      </div>
    </div>

    <!-- Scrollable Nav -->
    <nav class="nav-container">
      
      <a routerLink="/doctor/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link">
        <div class="nav-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
        </div>
        <span class="nav-text" *ngIf="isSidebarOpen">Clinical Overview</span>
      </a>

      <a routerLink="/doctor/appointments" routerLinkActive="active" class="nav-link">
        <div class="nav-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
        </div>
        <span class="nav-text" *ngIf="isSidebarOpen">Appointment Desk</span>
      </a>

      <a routerLink="/doctor/profile" routerLinkActive="active" class="nav-link">
        <div class="nav-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
        </div>
        <span class="nav-text" *ngIf="isSidebarOpen">Medical Profile</span>
      </a>

    </nav>

    <!-- Footer Profile -->
    <div class="sidebar-footer">
      <div class="profile-card" routerLink="/doctor/profile">
        <img src="https://ui-avatars.com/api/?name=Doctor+User&background=2caea9&color=fff" alt="Profile" class="avatar">
        <div class="profile-info" *ngIf="isSidebarOpen">
          <span class="profile-name">Practitioner</span>
          <span class="profile-role">Medical Department</span>
        </div>
      </div>
    </div>

  </aside>

  <!-- Main View Area -->
  <main class="main-wrapper">
    
    <!-- Topbar Actions (Navbar) -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="btn-toggle" (click)="toggleSidebar()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <div class="breadcrumb" *ngIf="isSidebarOpen">
          <span class="text-xs font-bold text-slate-500 tracking-widest uppercase">Clinical Portal</span>
        </div>
      </div>

      <div class="topbar-right">
        <button class="btn-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
        </button>

        <div class="user-anchor">
          <div class="avatar-mini">D</div>
          <div class="profile-details text-left mr-2" *ngIf="isSidebarOpen">
            <div class="text-[10px] font-black text-slate-500 uppercase leading-none mb-1">Medical Department</div>
            <div class="text-xs font-bold text-white leading-none">Practitioner</div>
          </div>
        </div>

        <button class="btn-logout" (click)="logout()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          <span>Sign Out</span>
        </button>
      </div>
    </header>

    <!-- Content Shell -->
    <div class="content-area">
      <router-outlet></router-outlet>
    </div>

  </main>

</div>

<div class="profile-manage-container p-6 text">
  <header class="page-header mb-10 flex justify-between items-end">
    <div>
      <h1 class="page-title text-2xl font-bold text-white">Medical Profile</h1>
      <p class="text-slate-500 text-sm mt-1">Practitioner identity and clinical verification</p>
    </div>
    <button (click)="saveProfile()"
      [disabled]="saving"
      class="btn-primary-admin px-8 py-3">
      <span *ngIf="saving" class="animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full mr-2"></span>
      {{ saving ? 'Synchronizing...' : 'Commit Changes' }}
    </button>
  </header>
 
  <div *ngIf="loading" class="flex flex-col items-center justify-center py-20">
    <div class="h-12 w-12 border-4 border-[#2caea9] border-t-transparent rounded-full animate-spin"></div>
    <p class="mt-4 text-slate-400 font-medium">Loading credentials...</p>
  </div>
 
  <div *ngIf="!loading" class="grid grid-cols-1 lg:grid-cols-3 gap-8">
 
    <!-- LEFT: Personal Identity -->
    <div class="management-column">
      <div class="admin-card text-center">
        <div class="relative group inline-block mb-6">
          <div class="absolute inset-0 bg-[#2caea9] rounded-full blur opacity-10 group-hover:opacity-30 transition-opacity"></div>
          <img [src]="profile.profilePic || '/doctor profile.png'"
            alt="Avatar" class="h-40 w-40 rounded-full object-cover border-4 border-[#30363d] relative z-10 shadow-2xl transition-transform group-hover:scale-105">
          <div class="absolute bottom-2 right-2 bg-[#2caea9] text-white p-2.5 rounded-2xl cursor-pointer hover:bg-[#238f8a] shadow-xl z-20 border-4 border-[#161b22]">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
          </div>
        </div>
 
        <h2 class="text-2xl font-black text-white">Dr. {{ profile.name }} {{ profile.lastName }}</h2>
        <p class="text-[#2caea9] font-bold text-xs uppercase tracking-widest mt-1 mb-8">{{ profile.email }}</p>
 
        <div class="text-left py-6 border-t border-[#30363d] space-y-6">
          <div class="form-group">
            <label class="form-label">Avatar Source (URL)</label>
            <input type="text" [(ngModel)]="profile.profilePic" class="admin-input text-xs" placeholder="https://...">
          </div>
 
          <div class="p-4 bg-[#2caea9]/5 rounded-xl border border-[#2caea9]/20 flex items-center gap-3">
             <div class="w-8 h-8 bg-[#2caea9]/20 rounded-lg flex items-center justify-center text-sm">✅</div>
             <div>
               <span class="text-[10px] font-black text-[#2caea9] uppercase tracking-widest block">Level 4 Practitioner</span>
               <span class="text-xs text-slate-400 font-bold italic">Medical Department Verified</span>
             </div>
          </div>
        </div>
      </div>
    </div>
 
    <!-- RIGHT: Professional & Practice Dossier (Unified Card) -->
    <div class="lg:col-span-2">
      <div class="admin-card">
        
        <!-- Section: Identity & Practice -->
        <div class="card-title mb-10 pb-4 border-b border-[#30363d]">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#2caea9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /><path d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
          <span>Professional Credentials & Practice Details</span>
        </div>
 
        <div class="admin-form space-y-10">
          
          <!-- Identity Group -->
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="form-group">
              <label class="form-label text-[10px] uppercase tracking-widest text-slate-500 font-black">Given Name</label>
              <input type="text" [(ngModel)]="profile.name" class="admin-input font-bold">
            </div>
            <div class="form-group">
              <label class="form-label text-[10px] uppercase tracking-widest text-slate-500 font-black">Family Name</label>
              <input type="text" [(ngModel)]="profile.lastName" class="admin-input font-bold">
            </div>
            <div class="form-group">
              <label class="form-label text-[10px] uppercase tracking-widest text-slate-500 font-black">Direct Contact</label>
              <input type="text" [(ngModel)]="profile.phone" class="admin-input" placeholder="+212 ...">
            </div>
          </div>

          <!-- Practice Parameters Group -->
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="form-group">
              <label class="form-label text-[10px] uppercase tracking-widest text-slate-500 font-black">Service Zone</label>
              <select [(ngModel)]="profile.cityId" class="admin-input font-bold">
                 <option [ngValue]="0" disabled>Select Zone</option>
                 <option *ngFor="let city of cities" [ngValue]="city.id">{{ city.cityName }}</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label text-[10px] uppercase tracking-widest text-slate-500 font-black">Consult Fee (MAD)</label>
              <input type="number" [(ngModel)]="profile.fees" class="admin-input font-black text-[#2caea9]">
            </div>
            <div class="form-group">
              <label class="form-label text-[10px] uppercase tracking-widest text-slate-500 font-black">Experience (Yrs)</label>
              <input type="number" [(ngModel)]="profile.experience" min="0" class="admin-input font-bold">
            </div>
          </div>

          <!-- Bio & Address Group -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-4 border-t border-[#30363d]/50">
            <div class="form-group">
              <label class="form-label text-[10px] uppercase tracking-widest text-slate-500 font-black">Professional Biography</label>
              <textarea [(ngModel)]="profile.bio" rows="4" class="admin-input leading-relaxed" placeholder="Summarize your clinical expertise..."></textarea>
            </div>
            <div class="form-group">
              <label class="form-label text-[10px] uppercase tracking-widest text-slate-500 font-black">Clinical Office Address</label>
              <textarea [(ngModel)]="profile.officeAddress" rows="4" class="admin-input leading-relaxed" placeholder="Complete institutional or private practice address..."></textarea>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>

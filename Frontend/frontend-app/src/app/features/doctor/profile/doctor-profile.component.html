<div class="p-6">
  <div class="flex flex-col md:flex-row justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-gray-800">My Profile</h1>
    <button (click)="saveProfile()"
      [disabled]="saving"
      class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition-colors shadow-sm font-medium flex items-center gap-2">
      <span *ngIf="saving" class="animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full"></span>
      <span>{{ saving ? 'Saving...' : 'Save Changes' }}</span>
    </button>
  </div>

  <div *ngIf="loading" class="flex justify-center py-20">
    <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600"></div>
  </div>

  <div *ngIf="!loading" class="grid grid-cols-1 lg:grid-cols-3 gap-8">

    <!-- Profile Card (Left) -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex flex-col items-center">
      <div class="relative group">
        <img [src]="profile.profilePic || 'https://ui-avatars.com/api/?name=' + profile.name + '+' + profile.lastName + '&background=random'"
          alt="Avatar" class="h-32 w-32 rounded-full object-cover border-4 border-blue-50 mb-4 transition-transform transform group-hover:scale-105">
        <div class="absolute bottom-4 right-0 bg-blue-600 text-white p-2 rounded-full cursor-pointer hover:bg-blue-700 shadow-md">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
        </div>
      </div>

      <h2 class="text-xl font-bold text-gray-800">{{ profile.name }} {{ profile.lastName }}</h2>
      <p class="text-gray-500 mb-6">{{ profile.email }}</p>

      <div class="w-full space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Profile Picture URL</label>
          <input type="text" [(ngModel)]="profile.profilePic" class="w-full rounded-lg border-gray-200 bg-gray-50 text-sm focus:bg-white transition-colors" placeholder="https://...">
        </div>

        <div class="pt-4 border-t border-gray-100">
           <h3 class="text-sm font-semibold text-gray-800 mb-2">Account Status</h3>
           <div class="flex items-center gap-2 text-green-600 bg-green-50 px-3 py-2 rounded-lg">
             <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
               <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
             </svg>
             <span class="text-sm font-medium">Verified Doctor</span>
           </div>
        </div>
      </div>
    </div>

    <!-- Edit Form (Right) -->
    <div class="lg:col-span-2 space-y-6">
      <!-- General Information -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
        <h3 class="text-lg font-bold text-gray-800 mb-6 flex items-center gap-2">
            <span class="bg-blue-100 text-blue-600 p-2 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
            </span>
            General Information
        </h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
            <input type="text" [(ngModel)]="profile.name" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 transition-shadow">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
            <input type="text" [(ngModel)]="profile.lastName" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 transition-shadow">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
            <input type="text" [(ngModel)]="profile.phone" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 transition-shadow">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Bio / About Me</label>
            <input type="text" [(ngModel)]="profile.bio" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 transition-shadow">
          </div>
        </div>
      </div>

      <!-- Professional Details -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
        <h3 class="text-lg font-bold text-gray-800 mb-6 flex items-center gap-2">
            <span class="bg-green-100 text-green-600 p-2 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                </svg>
            </span>
            Professional Details
        </h3>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
           <div>
             <label class="block text-sm font-medium text-gray-700 mb-1">City</label>
             <select [(ngModel)]="profile.cityId" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 transition-shadow">
                <option [ngValue]="0" disabled>Select City</option>
                <option *ngFor="let city of cities" [ngValue]="city.id">{{ city.cityName }}</option>
             </select>
           </div>
           <div>
             <label class="block text-sm font-medium text-gray-700 mb-1">Consultation Fees (MAD)</label>
             <div class="relative rounded-md shadow-sm">
               <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                 <span class="text-gray-500 sm:text-sm">$</span>
               </div>
               <input type="number" [(ngModel)]="profile.fees" class="w-full pl-7 rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 transition-shadow" placeholder="0.00">
             </div>
           </div>
           <div>
             <label class="block text-sm font-medium text-gray-700 mb-1">Experience (Years)</label>
             <input type="number" [(ngModel)]="profile.experience" min="0" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 transition-shadow" placeholder="e.g. 5">
           </div>
           <div class="col-span-2">
             <label class="block text-sm font-medium text-gray-700 mb-1">Office Address</label>
             <textarea [(ngModel)]="profile.officeAddress" rows="2" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 transition-shadow"></textarea>
           </div>
           <div class="col-span-2">
             <label class="block text-sm font-medium text-gray-700 mb-1">Working Hours</label>
             <textarea [(ngModel)]="profile.workingHours" rows="2" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 transition-shadow" placeholder="e.g. Mon-Fri: 9am - 5pm"></textarea>
           </div>
        </div>
      </div>
    </div>
  </div>
</div>

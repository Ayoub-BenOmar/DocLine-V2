<div class="flex h-screen bg-gray-50">
    <!-- Sidebar -->
    <aside class="bg-white shadow-xl transition-all duration-300 z-20 flex flex-col"
        [ngClass]="{'w-64': isSidebarOpen, 'w-20': !isSidebarOpen}">
        <!-- Logo Area -->
        <div class="h-16 flex items-center justify-center border-b border-gray-100">
            <div class="flex items-center gap-2 font-bold text-xl text-blue-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19.428 15.428a2 2 0 00-1.022-.547l-2.384-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
                </svg>
                <span [class.hidden]="!isSidebarOpen">DocLine</span>
            </div>
        </div>

        <!-- Navigation -->
        <nav class="flex-1 py-6 px-3 space-y-2 overflow-y-auto">
            <!-- Dashboard Link -->
            <a routerLink="/patient/dashboard" routerLinkActive="bg-blue-50 text-blue-600"
                [routerLinkActiveOptions]="{exact: true}"
                class="flex items-center p-3 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors group">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                </svg>
                <span class="ml-3 font-medium" [class.hidden]="!isSidebarOpen">Dashboard</span>
            </a>

            <!-- Profile Link -->
            <a routerLink="/patient/profile" routerLinkActive="bg-blue-50 text-blue-600"
                [routerLinkActiveOptions]="{exact: true}"
                class="flex items-center p-3 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors group">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
                <span class="ml-3 font-medium" [class.hidden]="!isSidebarOpen">Profile</span>
            </a>

            <!-- Appointments Link -->
            <a routerLink="/patient/appointments" routerLinkActive="bg-blue-50 text-blue-600"
                [routerLinkActiveOptions]="{exact: true}"
                class="flex items-center p-3 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors group">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                <span class="ml-3 font-medium" [class.hidden]="!isSidebarOpen">Appointments</span>
            </a>

            <!-- Browse Doctors Link -->
            <a routerLink="/doctors" routerLinkActive="bg-blue-50 text-blue-600"
                [routerLinkActiveOptions]="{exact: true}"
                class="flex items-center p-3 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors group">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
                <span class="ml-3 font-medium" [class.hidden]="!isSidebarOpen">Browse Doctors</span>
            </a>
        </nav>

        <!-- User Profile -->
        <div class="border-t border-gray-100 p-4">
            <div class="flex items-center" [class.justify-center]="!isSidebarOpen">
                <img src="https://ui-avatars.com/api/?name=Patient+User&background=0D8ABC&color=fff" alt="Profile"
                    class="h-10 w-10 rounded-full border-2 border-white shadow-sm">
                <div class="ml-3" [class.hidden]="!isSidebarOpen">
                    <p class="text-sm font-medium text-gray-700">Patient</p>
                    <p class="text-xs text-gray-500">patient@docline.com</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <!-- Topbar -->
        <header class="h-16 bg-white shadow-sm flex items-center justify-between px-6 z-10">
            <button (click)="toggleSidebar()"
                class="p-2 rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100 focus:outline-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>

            <div class="flex items-center space-x-4">
                <button class="p-2 text-gray-400 hover:text-gray-600 relative">
                    <span class="absolute top-2 right-2 h-2 w-2 rounded-full bg-red-500 ring-2 ring-white"></span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                    </svg>
                </button>
                <button (click)="logout()"
                    class="flex items-center space-x-2 p-2 text-gray-600 hover:bg-gray-100 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                    <span class="text-sm font-medium">Logout</span>
                </button>
            </div>
        </header>

        <!-- Content Area -->
        <div class="flex-1 overflow-auto bg-gray-50/50">
            <router-outlet></router-outlet>
        </div>
    </main>
</div>

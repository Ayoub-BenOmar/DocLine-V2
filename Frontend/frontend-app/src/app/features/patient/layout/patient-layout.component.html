<div class="admin-shell">
  <!-- Sidebar Navigation -->
  <aside class="sidebar" [class.collapsed]="!isSidebarOpen" [class.expanded]="isSidebarOpen">
    <!-- Brand Context -->
    <div class="logo-area">
      <div class="logo-icon">D+</div>
      <div class="brand-name" *ngIf="isSidebarOpen">DocLine</div>
    </div>

    <!-- Main Navigation Registry -->
    <nav class="nav-section">
      <div class="nav-item">
        <a routerLink="/patient/dashboard" class="nav-link" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
          <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span *ngIf="isSidebarOpen">Patient Dashboard</span>
        </a>
      </div>

      <div class="nav-item">
        <a routerLink="/patient/appointments" class="nav-link" routerLinkActive="active">
          <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span *ngIf="isSidebarOpen">Clinical Sessions</span>
        </a>
      </div>

      <div class="nav-item">
        <a routerLink="/doctors" class="nav-link" routerLinkActive="active">
          <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <span *ngIf="isSidebarOpen">Find Specialists</span>
        </a>
      </div>

      <div class="nav-item">
        <a routerLink="/patient/profile" class="nav-link" routerLinkActive="active">
          <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span *ngIf="isSidebarOpen">Personal Dossier</span>
        </a>
      </div>
    </nav>

    <!-- Sidebar Functional Anchors -->
    <div class="sidebar-footer">
      <div class="nav-item">
        <a routerLink="/patient/profile" class="nav-link" routerLinkActive="active">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          <span *ngIf="isSidebarOpen">Portal Settings</span>
        </a>
      </div>
    </div>
  </aside>

  <!-- Main System Shell -->
  <main class="main-wrapper">
    <!-- High-Fidelity Topbar -->
    <header class="topbar">
      <div class="topbar-left">
        <button (click)="toggleSidebar()" class="btn-toggle">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="breadcrumb" *ngIf="isSidebarOpen">
          <span class="text-xs font-bold text-slate-500 tracking-widest uppercase">Patient Portal</span>
        </div>
      </div>

      <div class="topbar-right">
        <!-- <button class="btn-icon">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
          <div class="notification-dot"></div>
        </button> -->

        <!-- <div class="user-anchor">
          <div class="avatar-mini">P</div>
          <div class="text-left mr-2" *ngIf="isSidebarOpen">
            <div class="text-[10px] font-black text-slate-500 uppercase leading-none mb-1">Standard Patient</div>
            <div class="text-xs font-bold text-white leading-none">Registered User</div>
          </div>
        </div> -->

        <button class="btn-logout" (click)="logout()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          <span>Sign Out</span>
        </button>
      </div>
    </header>

    <!-- Dynamic Content Registry -->
    <section class="content-area">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>

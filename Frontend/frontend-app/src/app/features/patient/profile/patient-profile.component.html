<div class="p-6">
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-3xl font-bold text-gray-800">👤 My Profile</h1>
        <button (click)="toggleEditMode()"
            [class]="editMode ? 'bg-red-600 hover:bg-red-700' : 'bg-blue-600 hover:bg-blue-700'"
            class="text-white font-medium py-2 px-6 rounded-lg transition">
            {{ editMode ? '❌ Cancel' : '✏️ Edit Profile' }}
        </button>
    </div>

    <!-- Message Alert -->
    <div *ngIf="message" [ngClass]="{'bg-green-100 border-green-400 text-green-700': messageType === 'success', 'bg-red-100 border-red-400 text-red-700': messageType === 'error'}" class="border px-4 py-3 rounded mb-6">
        {{ message }}
    </div>

    <!-- Loading State -->
    <div *ngIf="loading" class="text-center py-12">
        <p class="text-gray-600">⏳ Loading your profile...</p>
    </div>

    <!-- Profile Content -->
    <div *ngIf="!loading && profile" class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- Profile Picture Card -->
        <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
            <div class="text-center">
                <img *ngIf="profile.profilePic" [src]="profile.profilePic"
                    class="w-32 h-32 rounded-full mx-auto mb-4 object-cover border-4 border-blue-200">
                <div *ngIf="!profile.profilePic" class="w-32 h-32 rounded-full mx-auto mb-4 bg-gray-200 flex items-center justify-center text-4xl">
                    👤
                </div>
                <h2 class="text-2xl font-bold text-gray-800">{{ profile.name }} {{ profile.lastName }}</h2>
                <p class="text-gray-600">{{ profile.email }}</p>
                <p class="text-sm text-gray-500 mt-2">Patient ID: {{ profile.id }}</p>
            </div>
        </div>

        <!-- Main Profile Information -->
        <div class="lg:col-span-2 space-y-6">
            <!-- Personal Information -->
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                <h3 class="text-xl font-bold mb-4 text-gray-800">📋 Personal Information</h3>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- First Name -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">First Name</label>
                        <input *ngIf="!editMode" type="text" [value]="profile.name"
                            class="w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg text-gray-600" disabled>
                        <input *ngIf="editMode" type="text" [(ngModel)]="formData.name"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>

                    <!-- Last Name -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Last Name</label>
                        <input *ngIf="!editMode" type="text" [value]="profile.lastName"
                            class="w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg text-gray-600" disabled>
                        <input *ngIf="editMode" type="text" [(ngModel)]="formData.lastName"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>

                    <!-- Email -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                        <input type="email" [value]="profile.email"
                            class="w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg text-gray-600" disabled>
                    </div>

                    <!-- Phone -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Phone</label>
                        <input *ngIf="!editMode" type="text" [value]="profile.phone || '-'"
                            class="w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg text-gray-600" disabled>
                        <input *ngIf="editMode" type="text" [(ngModel)]="formData.phone"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>

                    <!-- Birthdate -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Birthdate</label>
                        <input *ngIf="!editMode" type="text" [value]="profile.birthdate || '-'"
                            class="w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg text-gray-600" disabled>
                        <input *ngIf="editMode" type="date" [(ngModel)]="formData.birthdate"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>

                    <!-- Gender -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Gender</label>
                        <input *ngIf="!editMode" type="text" [value]="profile.gender || '-'"
                            class="w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg text-gray-600" disabled>
                        <select *ngIf="editMode" [(ngModel)]="formData.gender"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">Select Gender</option>
                            <option value="MALE">Male</option>
                            <option value="FEMALE">Female</option>
                            <option value="OTHER">Other</option>
                        </select>
                    </div>

                    <!-- CIN -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">CIN/ID Number</label>
                        <input *ngIf="!editMode" type="text" [value]="profile.cin || '-'"
                            class="w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg text-gray-600" disabled>
                        <input *ngIf="editMode" type="text" [(ngModel)]="formData.cin"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>

                    <!-- Blood Type -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Blood Type</label>
                        <input type="text" [value]="profile.bloodType || '-'"
                            class="w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg text-gray-600" disabled>
                    </div>

                    <!-- Address -->
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Address</label>
                        <input *ngIf="!editMode" type="text" [value]="profile.address || '-'"
                            class="w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg text-gray-600" disabled>
                        <input *ngIf="editMode" type="text" [(ngModel)]="formData.address"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>

                    <!-- City -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">City</label>
                        <input type="text" [value]="profile.city || '-'"
                            class="w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg text-gray-600" disabled>
                    </div>
                </div>
            </div>

            <!-- Insurance Information -->
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                <h3 class="text-xl font-bold mb-4 text-gray-800">🏥 Insurance Information</h3>

                <div class="space-y-4">
                    <!-- Has Insurance -->
                    <div class="flex items-center">
                        <input *ngIf="!editMode" type="checkbox" [checked]="profile.hasInsurance" disabled
                            class="h-4 w-4 text-blue-600 rounded focus:ring-blue-500">
                        <input *ngIf="editMode" type="checkbox" [(ngModel)]="formData.hasInsurance"
                            class="h-4 w-4 text-blue-600 rounded focus:ring-blue-500">
                        <label class="ml-3 text-sm font-medium text-gray-700">Has Insurance</label>
                    </div>

                    <!-- Insurance Provider -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Insurance Provider</label>
                        <input *ngIf="!editMode" type="text" [value]="profile.insuranceProvider || '-'"
                            class="w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg text-gray-600" disabled>
                        <input *ngIf="editMode" type="text" [(ngModel)]="formData.insuranceProvider"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>

                    <!-- Insurance Number -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Insurance Number</label>
                        <input *ngIf="!editMode" type="text" [value]="profile.insuranceNumber || '-'"
                            class="w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg text-gray-600" disabled>
                        <input *ngIf="editMode" type="text" [(ngModel)]="formData.insuranceNumber"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
            </div>

            <!-- Save Button -->
            <div *ngIf="editMode" class="flex gap-4">
                <button (click)="saveProfile()" [disabled]="saving"
                    class="flex-1 bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-4 rounded-lg transition disabled:opacity-50">
                    {{ saving ? '💾 Saving...' : '💾 Save Changes' }}
                </button>
            </div>
        </div>
    </div>
</div>

<div class="p-6">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-gray-800">Doctors Directory</h1>
        <div class="flex gap-2">
            <button
                class="px-4 py-2 bg-white border border-gray-200 rounded-lg text-gray-600 hover:bg-gray-50 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" />
                </svg>
                Filter
            </button>
            <button
                class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
                Add Doctor
            </button>
        </div>
    </div>

    <!-- Loading State -->
    <div *ngIf="loading" class="flex justify-center items-center py-20">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
    </div>

    <!-- Grid -->
    <div *ngIf="!loading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div *ngFor="let doctor of doctors"
            class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex flex-col items-center text-center hover:shadow-md transition-shadow">
            <div class="relative mb-4">
                <img [src]="doctor.profilePic || 'https://ui-avatars.com/api/?name=' + doctor.name + '+' + doctor.lastName + '&background=random'"
                    alt="Avatar" class="h-24 w-24 rounded-full object-cover border-4 border-gray-50">
                <div class="absolute bottom-0 right-0 h-4 w-4 bg-green-500 rounded-full border-2 border-white"
                    title="Active"></div>
            </div>

            <h3 class="font-bold text-lg text-gray-900">{{ doctor.name }} {{ doctor.lastName }}</h3>
            <p class="text-blue-600 font-medium text-sm mb-2">{{ doctor.speciality || 'General Practitioner' }}</p>

            <div class="flex items-center gap-1 text-gray-500 text-sm mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                {{ doctor.city || 'Unknown City' }}
            </div>

            <div class="w-full border-t border-gray-100 pt-4 flex justify-between items-center text-sm">
                <div class="text-gray-500">Fees</div>
                <div class="font-semibold text-gray-800">{{ doctor.fees | currency:'MAD ':'symbol':'1.0-0' }}</div>
            </div>
            <div class="w-full mt-4 flex gap-2">
                <button
                    class="flex-1 py-2 px-3 bg-gray-50 text-gray-700 rounded-lg hover:bg-gray-100 text-sm font-medium transition-colors">Profile</button>
                <button
                    class="flex-1 py-2 px-3 bg-blue-50 text-blue-700 rounded-lg hover:bg-blue-100 text-sm font-medium transition-colors">Schedule</button>
            </div>
        </div>

        <!-- Empty State -->
        <div *ngIf="doctors.length === 0" class="col-span-full py-12 text-center text-gray-500">
            No doctors found in the system.
        </div>
    </div>
</div>

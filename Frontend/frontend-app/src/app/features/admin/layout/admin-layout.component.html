<div class="admin-shell">

  <!-- Notification Container -->
  <app-notification-container></app-notification-container>

  <!-- Sidebar Navigation -->
  <aside class="sidebar" [ngClass]="isSidebarOpen ? 'sidebar-open' : 'sidebar-collapsed'">
    
    <!-- Header Logo -->
    <div class="logo-area">
      <div class="logo-inner">
        <div class="nav-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <span class="logo-text" *ngIf="isSidebarOpen">DocLine Admin</span>
      </div>
    </div>

    <!-- Scrollable Nav -->
    <nav class="nav-container">
      
      <a routerLink="/admin/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link">
        <div class="nav-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
        </div>
        <span class="nav-text" *ngIf="isSidebarOpen">Overview</span>
      </a>

      <a routerLink="/admin/doctors" routerLinkActive="active" class="nav-link">
        <div class="nav-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </div>
        <span class="nav-text" *ngIf="isSidebarOpen">Specialists</span>
      </a>

      <a routerLink="/admin/patients" routerLinkActive="active" class="nav-link">
        <div class="nav-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
        </div>
        <span class="nav-text" *ngIf="isSidebarOpen">Patients</span>
      </a>

      <a routerLink="/admin/statistics" routerLinkActive="active" class="nav-link">
        <div class="nav-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
        </div>
        <span class="nav-text" *ngIf="isSidebarOpen">Insights</span>
      </a>

      <a routerLink="/admin/cities" routerLinkActive="active" class="nav-link">
        <div class="nav-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
        </div>
        <span class="nav-text" *ngIf="isSidebarOpen">Regions</span>
      </a>

      <a routerLink="/admin/specialties" routerLinkActive="active" class="nav-link">
        <div class="nav-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
        </div>
        <span class="nav-text" *ngIf="isSidebarOpen">Medical Types</span>
      </a>

    </nav>

    <!-- Footer Profile -->
    <div class="sidebar-footer">
      <div class="profile-card">
        <img src="https://ui-avatars.com/api/?name=Admin+User&background=2caea9&color=fff" alt="Profile" class="avatar">
        <div class="profile-info" *ngIf="isSidebarOpen">
          <span class="profile-name">Administrator</span>
          <span class="profile-role">System Controller</span>
        </div>
      </div>
    </div>

  </aside>

  <!-- Main View Area -->
  <main class="main-wrapper">
    
    <!-- Topbar Actions -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="btn-toggle" (click)="toggleSidebar()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <div class="breadcrumb" *ngIf="isSidebarOpen">
          <span class="text-xs font-bold text-slate-500 tracking-widest uppercase">Management Panel</span>
        </div>
      </div>

      <div class="topbar-right">
        <button class="btn-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
        </button>

        <div class="user-anchor">
          <div class="avatar-mini">A</div>
          <div class="profile-details text-left mr-2" *ngIf="isSidebarOpen">
            <div class="text-[10px] font-black text-slate-500 uppercase leading-none mb-1">System Controller</div>
            <div class="text-xs font-bold text-white leading-none">Global Admin</div>
          </div>
        </div>

        <button class="btn-logout" (click)="logout()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          <span>Sign Out</span>
        </button>
      </div>
    </header>

    <!-- Content Shell -->
    <div class="content-area">
      <router-outlet></router-outlet>
    </div>

  </main>

</div>

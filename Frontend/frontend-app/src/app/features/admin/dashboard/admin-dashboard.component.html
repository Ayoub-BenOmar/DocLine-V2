<div class="p-6">
    <h1 class="text-3xl font-bold mb-6 text-gray-800">Admin Dashboard</h1>

    <!-- Management Sections -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
        <!-- Add City Section -->
        <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
            <h2 class="text-xl font-bold mb-4 text-gray-800">➕ Add City</h2>
            <form (ngSubmit)="addCity()" #cityForm="ngForm" class="space-y-4">
                <div>
                    <label for="cityName" class="block text-sm font-medium text-gray-700 mb-2">City Name</label>
                    <input
                        type="text"
                        id="cityName"
                        name="cityName"
                        [(ngModel)]="newCity.cityName"
                        placeholder="e.g., Casablanca"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                        required
                    >
                </div>
                <button
                    type="submit"
                    [disabled]="addingCity"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg transition disabled:opacity-50"
                >
                    {{ addingCity ? 'Adding...' : 'Add City' }}
                </button>
                <div *ngIf="cityMessage" [ngClass]="{'text-green-600': citySuccess, 'text-red-600': !citySuccess}" class="text-sm">
                    {{ cityMessage }}
                </div>
            </form>
        </div>

        <!-- Add Specialty Section -->
        <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
            <h2 class="text-xl font-bold mb-4 text-gray-800">➕ Add Specialty</h2>
            <form (ngSubmit)="addSpecialty()" #specialtyForm="ngForm" class="space-y-4">
                <div>
                    <label for="specialityName" class="block text-sm font-medium text-gray-700 mb-2">Specialty Name</label>
                    <input
                        type="text"
                        id="specialityName"
                        name="specialityName"
                        [(ngModel)]="newSpecialty.specialiteName"
                        placeholder="e.g., Cardiology"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                        required
                    >
                </div>
                <button
                    type="submit"
                    [disabled]="addingSpecialty"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg transition disabled:opacity-50"
                >
                    {{ addingSpecialty ? 'Adding...' : 'Add Specialty' }}
                </button>
                <div *ngIf="specialtyMessage" [ngClass]="{'text-green-600': specialtySuccess, 'text-red-600': !specialtySuccess}" class="text-sm">
                    {{ specialtyMessage }}
                </div>
            </form>
        </div>
    </div>

    <!-- Quick Links -->
    <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
        <h2 class="text-xl font-bold mb-4 text-gray-800">🔗 Quick Links</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <a routerLink="../statistics" class="p-4 bg-green-50 hover:bg-green-100 rounded-lg text-center transition cursor-pointer">
                <div class="text-2xl mb-2">📊</div>
                <div class="text-sm font-medium text-gray-800">Statistics</div>
            </a>
            <a routerLink="../cities" class="p-4 bg-blue-50 hover:bg-blue-100 rounded-lg text-center transition cursor-pointer">
                <div class="text-2xl mb-2">🏙️</div>
                <div class="text-sm font-medium text-gray-800">Manage Cities</div>
            </a>
            <a routerLink="../specialties" class="p-4 bg-purple-50 hover:bg-purple-100 rounded-lg text-center transition cursor-pointer">
                <div class="text-2xl mb-2">🏥</div>
                <div class="text-sm font-medium text-gray-800">Manage Specialties</div>
            </a>
            <a routerLink="../doctors" class="p-4 bg-red-50 hover:bg-red-100 rounded-lg text-center transition cursor-pointer">
                <div class="text-2xl mb-2">👨‍⚕️</div>
                <div class="text-sm font-medium text-gray-800">Manage Doctors</div>
            </a>
        </div>
    </div>
</div>

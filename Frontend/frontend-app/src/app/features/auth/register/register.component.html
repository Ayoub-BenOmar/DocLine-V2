<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8">
        <div>
            <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">Create your account</h2>
        </div>

        <form class="mt-8 space-y-6" [formGroup]="registerForm" (ngSubmit)="onSubmit()">

            <!-- Role Selection -->
            <div class="flex justify-center space-x-6">
                <label class="inline-flex items-center">
                    <input type="radio" formControlName="role" value="ROLE_PATIENT" class="form-radio text-indigo-600">
                    <span class="ml-2">Patient</span>
                </label>
                <label class="inline-flex items-center">
                    <input type="radio" formControlName="role" value="ROLE_DOCTOR" class="form-radio text-indigo-600">
                    <span class="ml-2">Doctor</span>
                </label>
            </div>

            <!-- Common Fields -->
            <div class="rounded-md shadow-sm -space-y-px">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="name" class="sr-only">First Name</label>
                        <input id="name" formControlName="name" type="text" required
                            class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-t-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm"
                            placeholder="First Name">
                    </div>
                    <div>
                        <label for="lastName" class="sr-only">Last Name</label>
                        <input id="lastName" formControlName="lastName" type="text" required
                            class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-t-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm"
                            placeholder="Last Name">
                    </div>
                </div>
                <div>
                    <label for="email" class="sr-only">Email address</label>
                    <input id="email" formControlName="email" type="email" autocomplete="email" required
                        class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm"
                        placeholder="Email address">
                </div>
                <div>
                    <label for="phone" class="sr-only">Phone</label>
                    <input id="phone" formControlName="phone" type="tel" required
                        class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm"
                        placeholder="Phone (+212... or 06...)">
                </div>
                <div>
                    <label for="password" class="sr-only">Password</label>
                    <input id="password" formControlName="password" type="password" required
                        class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm"
                        placeholder="Password (min 8 chars)">
                </div>
                <div>
                    <label for="confirmPassword" class="sr-only">Confirm Password</label>
                    <input id="confirmPassword" formControlName="confirmPassword" type="password" required
                        class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-b-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm"
                        placeholder="Confirm Password">
                </div>
            </div>

            <!-- Doctor Specific Fields -->
            <div *ngIf="isDoctor" class="space-y-4 border-t pt-4">
                <h3 class="text-lg font-medium text-gray-900">Education & Licence</h3>

                <div>
                    <label for="medicalLicence" class="block text-sm font-medium text-gray-700">Medical Licence</label>
                    <input id="medicalLicence" formControlName="medicalLicence" type="text"
                        class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>

                <div>
                    <label for="education" class="block text-sm font-medium text-gray-700">Medical Doc
                        (Education/Details)</label>
                    <textarea id="education" formControlName="education" rows="3"
                        class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"></textarea>
                </div>

                <div>
                    <label for="cityId" class="block text-sm font-medium text-gray-700">City</label>
                    <select id="cityId" formControlName="cityId"
                        class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm rounded-md">
                        <option [ngValue]="null">Select City</option>
                        <option *ngFor="let city of cities" [value]="city.id">{{ city.cityName }}</option>
                    </select>
                </div>

                <div>
                    <label for="specialityId" class="block text-sm font-medium text-gray-700">Speciality</label>
                    <select id="specialityId" formControlName="specialityId"
                        class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm rounded-md">
                        <option [ngValue]="null">Select Speciality</option>
                        <option *ngFor="let spec of specialities" [value]="spec.id">{{ spec.specialiteName }}</option>
                    </select>
                </div>
            </div>

            <div *ngIf="errorMessage" class="text-red-500 text-sm text-center">
                {{ errorMessage }}
            </div>
            <div *ngIf="registerForm.errors?.['mismatch'] && registerForm.get('confirmPassword')?.touched"
                class="text-red-500 text-sm text-center">
                Passwords do not match
            </div>

            <div>
                <button type="submit" [disabled]="registerForm.invalid"
                    class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:bg-gray-400">
                    Register
                </button>
            </div>

            <div class="text-center">
                <a routerLink="/login" class="font-medium text-indigo-600 hover:text-indigo-500">
                    Already have an account? Login
                </a>
            </div>
        </form>
    </div>
</div>
